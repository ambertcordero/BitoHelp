services:
  backend:
    build:
      context: ./backend
    ports:
      - "8001:8000"
    volumes:
      - ./backend/db.sqlite3:/app/db.sqlite3
    environment:
      - DJANGO_DEBUG=True
      - ALLOWED_HOSTS=*
      - CORS_ALLOWED_ORIGINS=http://localhost:9000

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "9000:9000"
    environment:
      - VITE_API_URL=http://localhost:8001/api/
      - DOCKER=1
    depends_on:
      - backend
