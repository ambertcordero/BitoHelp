# -------------------------------------------------------
# CrypToCare — Docker Compose (development)
# Start everything:  docker compose up --build
# Stop everything:   docker compose down
# -------------------------------------------------------

services:
  # ---- Django REST API ----
  backend:
    build:
      context: ./backend
    ports:
      - '8001:8000' # Host 8001 → Container 8000
    volumes:
      # Persist the SQLite database between container restarts.
      # The file must already exist on the host (it ships in the repo).
      - ./backend/db.sqlite3:/app/db.sqlite3
    env_file:
      # Passes OPENAI_API_KEY (and any future secrets) into the container.
      # python-decouple reads this automatically.
      - ./backend/.env
    environment:
      - DJANGO_DEBUG=True
      - ALLOWED_HOSTS=*
      - CORS_ALLOWED_ORIGINS=http://localhost:9000

  # ---- Quasar / Vite frontend ----
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '9000:9000' # Host 9000 → Container 9000
    environment:
      # VITE_API_URL is a *client-side* env var — the browser, not the
      # container, makes the request, so it must point to the host-published
      # port (localhost:8001), NOT the Docker service name.
      - VITE_API_URL=http://localhost:8001/api/
      # DOCKER=1 tells quasar.config.js to bind the dev server to 0.0.0.0
      - DOCKER=1
    depends_on:
      - backend
