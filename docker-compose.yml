# -------------------------------------------------------
# CrypToCare — Docker Compose (development)
# Start everything:  docker compose up --build
# Stop everything:   docker compose down
# -------------------------------------------------------

services:
  # ---- PostgreSQL database ----
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - '5432:5432' # Host 5432 → Container 5432
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: cryptocare
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

  # ---- Django REST API ----
  backend:
    build:
      context: ./backend
    ports:
      - '8001:8000' # Host 8001 → Container 8000
    volumes:
      # Bind mount: sync local backend/ code into container for live reload.
      # Django's runserver auto-restarts on .py file changes.
      - ./backend:/app
      # Persist the SQLite database between container restarts.
      - ./backend/db.sqlite3:/app/db.sqlite3
    env_file:
      # Passes OPENAI_API_KEY (and any future secrets) into the container.
      # python-decouple reads this automatically.
      - ./backend/.env
    environment:
      - DJANGO_DEBUG=True
      - ALLOWED_HOSTS=*
      - CORS_ALLOWED_ORIGINS=http://localhost:9000
      - DATABASE_URL=postgres://postgres:postgres@db:5432/cryptocare
    depends_on:
      db:
        condition: service_started

  # ---- Quasar / Vite frontend ----
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '9000:9000' # Host 9000 → Container 9000
    volumes:
      # Bind mount: sync entire project into container for Vite HMR.
      # File saves in VS Code trigger instant browser refresh.
      - .:/app
      # Anonymous volume: preserve container's node_modules (installed during
      # docker build) so they don't get overwritten by the host's.
      - /app/node_modules
    environment:
      # VITE_API_URL is a *client-side* env var — the browser, not the
      # container, makes the request, so it must point to the host-published
      # port (localhost:8001), NOT the Docker service name.
      - VITE_API_URL=http://localhost:8001/api/
      # DOCKER=1 tells quasar.config.js to bind the dev server to 0.0.0.0
      - DOCKER=1
    depends_on:
      - backend

volumes:
  pgdata:
