services:
  # Django Backend API
  - type: web
    name: bitohelp-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate --noinput
    startCommand: gunicorn bitohelp_api.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: SITE_BASE_URL
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.3"

  # Quasar Frontend (Static Site)
  - type: web
    name: bitohelp
    runtime: static
    region: oregon
    plan: free
    buildCommand: "corepack enable && corepack prepare pnpm@latest --activate && pnpm install --no-frozen-lockfile && pnpm build"
    staticPublishPath: dist/spa
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: NODE_VERSION
        value: "22"
